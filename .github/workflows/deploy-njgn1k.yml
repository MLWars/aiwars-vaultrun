name: deploy-njgn1k

# Push-triggered variant of deploy.yml for agent sessions that can't use
# workflow_dispatch. Scoped to THIS branch only; builds the vaultrun referee and
# pushes it to the aiwars-njgn1k deployment's per-deployment ECR repo
# `aiwars/aiwars-njgn1k/mcp`. Hardcoded to aiwars-njgn1k (never touches
# aiwars-test-asaf); no ecr:CreateRepository; does NOT push `:latest`.
on:
  push:
    branches: [claude/njgn1k-referee-push]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-njgn1k-vaultrun
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  DEPLOYMENT: aiwars-njgn1k

jobs:
  deploy:
    runs-on: [self-hosted, aiwars-ec2]
    steps:
      - uses: actions/checkout@v4

      - name: Read game manifest
        id: game
        run: |
          set -euo pipefail
          {
            python3 - <<'PY'
          import base64, tomllib
          raw = open("game.toml", "rb").read()
          g = tomllib.loads(raw.decode()).get("game", {})
          print(f"name={g['name']}")
          print("labels<<LBL")
          for k, v in g.items():
              print(f"org.aiwars.game.{k}={v}")
          # The image IS the metadata channel: the whole game.toml rides on the referee
          # image as one base64 label (base64: the `labels:` input is line-delimited),
          # read straight from ECR by the platform API — no S3 metadata sidecar.
          print(f"org.aiwars.game-toml-b64={base64.b64encode(raw).decode()}")
          print("LBL")
          PY
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to the deployment's ECR
        id: ecr
        run: |
          set -euo pipefail
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO_NAME="aiwars/${DEPLOYMENT}/mcp"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"
          echo "repo=${REGISTRY}/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push the referee image to the deployment's ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.repo }}:${{ steps.game.outputs.name }}
            ${{ steps.ecr.outputs.repo }}:${{ steps.game.outputs.name }}-${{ github.sha }}
          labels: ${{ steps.game.outputs.labels }}
          secrets: |
            gh_token=${{ secrets.AIWARS_DEP_TOKEN }}

      - name: Verify the tag landed
        run: |
          set -euo pipefail
          aws ecr describe-images --repository-name "aiwars/${DEPLOYMENT}/mcp" \
            --image-ids imageTag=${{ steps.game.outputs.name }} --region "$AWS_REGION" \
            --query 'imageDetails[0].{digest:imageDigest,pushedAt:imagePushedAt,tags:imageTags}' --output table \
            || echo "::warning::describe-images not permitted for this role; rely on the push step above"

      - run: |
          echo "Pushed **${{ steps.game.outputs.name }}** referee -> \`${{ steps.ecr.outputs.repo }}\` (tags: \`${{ steps.game.outputs.name }}\`, \`${{ steps.game.outputs.name }}-${{ github.sha }}\`) for deployment **aiwars-njgn1k**." >> "$GITHUB_STEP_SUMMARY"
