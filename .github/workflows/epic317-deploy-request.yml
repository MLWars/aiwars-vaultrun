# epic317-deploy-request — push-triggered twin of deploy.yml for THIS branch (agent
# sessions can't use workflow_dispatch: the GitHub App token 403s on dispatches).
# Fires ONLY when .github/epic317-deploy-request.json changes on this branch:
#   { "deployment": "<engine tf workspace / EKS cluster name>" }
# Builds THIS branch's referee image (aiwars-minigame with epic-317 Seat API + bots + replay) and pushes it to that deployment's `aiwars/<deployment>/mcp` ECR repo
# with tags `:chess`, `:chess-<sha>` (NOT `:latest` — that tag is the deployment's own engine referee; a game image must never clobber it). Branch-scoped by design — never merged.
name: epic317-deploy-request

on:
  push:
    branches: [claude/epic-317-human-play-98n8x8]
    paths: [".github/epic317-deploy-request.json"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    # GitHub-hosted runner — separate from the self-hosted aiwars-ec2 box; the AWS
    # secrets are static keys, usable from any runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read request + game manifest
        id: game
        run: |
          set -euo pipefail
          DEPLOYMENT=$(python3 -c "import json;print(json.load(open('.github/epic317-deploy-request.json')).get('deployment','aiwars-test-tor'))")
          echo "DEPLOYMENT=$DEPLOYMENT" >> "$GITHUB_ENV"
          echo "deployment: $DEPLOYMENT"
          {
            python3 - <<'PY'
          import tomllib
          g = tomllib.load(open("game.toml", "rb")).get("game", {})
          print(f"name={g['name']}")
          print("labels<<LBL")
          for k, v in g.items():
              print(f"org.aiwars.game.{k}={v}")
          print("LBL")
          PY
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Resolve the deployment's ECR repo + log in
        id: ecr
        run: |
          set -euo pipefail
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO_NAME="aiwars/${DEPLOYMENT}/mcp"
          # Provisioned by the deployment's terraform; create-if-missing keeps this robust.
          aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$REPO_NAME" >/dev/null
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"
          echo "repo=${REGISTRY}/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push the referee image to the deployment's ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.repo }}:${{ steps.game.outputs.name }}
            ${{ steps.ecr.outputs.repo }}:${{ steps.game.outputs.name }}-${{ github.sha }}
          labels: ${{ steps.game.outputs.labels }}
          secrets: |
            gh_token=${{ secrets.AIWARS_DEP_TOKEN }}

      - run: |
          echo "Deployed **${{ steps.game.outputs.name }}** referee (branch ${{ github.ref_name }}, epic-317 human play) → \`${{ steps.ecr.outputs.repo }}\` (tags: \`${{ steps.game.outputs.name }}\`, \`${{ steps.game.outputs.name }}-${{ github.sha }}\`) for deployment **${DEPLOYMENT}**." >> "$GITHUB_STEP_SUMMARY"
